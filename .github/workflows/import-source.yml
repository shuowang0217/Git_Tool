name: Import Git-Tool source

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/import-source.yml"
      - ".import/source.part*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore source package
        run: |
          set -e
          cat .import/source.part* > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.zip
          rm -rf /tmp/source
          mkdir -p /tmp/source
          unzip -q /tmp/source.zip -d /tmp/source
          rsync -a /tmp/source/Git_Tool/ ./
          rm -rf .import .github/workflows/import-source.yml
          git status --short
      - name: Commit imported source
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import Git-Tool v1.5.1 source"
            git push
          fi
